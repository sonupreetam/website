# ═══════════════════════════════════════════════════════════════════════
# Discovery configuration.
#
# When `sync-content --discover` is run, the engine scans the GitHub org
# for repos and docs that are NOT yet declared in `sources` above.
# It reports what's new so a human can decide whether to add them.
#
# This catches:
#   • New repos appearing in the org
#   • New .md files added under docs/ or root in tracked repos
#
# Discovery never writes files — it only reports.
# ═══════════════════════════════════════════════════════════════════════
discovery:
  # GitHub org to scan for repos.
  org: complytime

  # Repos to ignore during discovery (infra, config, non-project repos).
  ignore_repos:
    - complytime/.github
    - complytime/org-infra
    - complytime/complytime-website   # this repo (self)

  # File patterns to ignore when scanning docs inside tracked repos.
  # These are internal/contributor-facing files we intentionally skip.
  ignore_files:
    - CONTRIBUTING.md
    - CODE_OF_CONDUCT.md
    - RELEASE_PROCESS.md
    - STYLE_GUIDE.md
    - TESTING_FARM.md
    - E2E_INTEGRATION.md
    - CHANGELOG.md
    - MAINTAINERS.md
    - LICENSE

  # Directories to scan for Markdown files (in addition to root README.md).
  scan_paths:
    - docs
