# sync-config.yaml
# Declarative manifest for cross-repo content synchronization.
#
# The sync engine reads this file and pulls the declared files from each
# source repository into the website's content/ tree. It is designed to
# run inside a scheduled GitHub Actions workflow (daily) or on-demand via
# workflow_dispatch.
#
# Adding a new source: append an entry under `sources` with the repo,
# branch, and file mappings. The sync engine handles the rest.
#
# ─────────────────────────────────────────────────────────────────────
# SCOPE: Production repositories only (complytime/ org).
#
# complytime/ (Production)
#   complyctl                       – CLI tool
#   complyscribe                    – C2P engine
#   complytime-collector-components – Observability toolkit
#   compliance-to-policy-go         – C2P Go library (fork)
#   org-infra                       – Shared CI/CD (infra, not synced)
#   .github                         – Org config  (infra, not synced)
#
# Staging/labs repos (complytime-staging/) are NOT included here.
# They can be added once promoted to production.
# ─────────────────────────────────────────────────────────────────────

# Global defaults applied to every source unless overridden.
defaults:
  branch: main
  # GitHub API base (override for GHES).
  github_api: https://api.github.com

sources:
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # complyctl — CLI tool for end-to-end compliance workflows
  # https://github.com/complytime/complyctl
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  - repo: complytime/complyctl
    files:
      # ── Project overview (README) ──
      - src: README.md
        dest: content/docs/projects/complyctl/_index.md
        transform:
          inject_frontmatter:
            title: "complyctl"
            description: "A command-line tool for streamlining end-to-end compliance workflows."
            weight: 10
          rewrite_links: true
          strip_badges: true

      # ── Quick Start ──
      - src: docs/QUICK_START.md
        dest: content/docs/projects/complyctl/quick-start.md
        transform:
          inject_frontmatter:
            title: "Quick Start"
            description: "Get up and running with complyctl in minutes."
            weight: 20
          rewrite_links: true

      # ── Installation ──
      - src: docs/INSTALLATION.md
        dest: content/docs/projects/complyctl/installation.md
        transform:
          inject_frontmatter:
            title: "Installation"
            description: "Install complyctl on your system."
            weight: 30
          rewrite_links: true

      # ── Plugin Guide ──
      - src: docs/PLUGIN_GUIDE.md
        dest: content/docs/projects/complyctl/plugin-guide.md
        transform:
          inject_frontmatter:
            title: "Plugin Guide"
            description: "Discover, install, and manage complyctl plugins."
            weight: 40
          rewrite_links: true

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
