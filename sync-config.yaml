# sync-config.yaml — declarative file sync manifest
#
# This config layers precise file-level syncs on top of the org-wide scan.
# Run with: go run ./cmd/sync-content --org complytime --config sync-config.yaml --write
#
# ─────────────────────────────────────────────────────────────────────
# Hybrid mode:
#
# The org scan remains the default baseline — every repo in the org
# gets a ProjectCard and an auto-generated project page from its
# README. This config adds precision where needed:
#
#   skip_org_sync: true   → suppress the auto-generated project page
#                           for this repo; only the config-declared
#                           files are synced. The ProjectCard is still
#                           built from API metadata.
#
#   skip_org_sync: false  → (default) the org scan runs normally AND
#                           the config-declared files are synced as
#                           additional content.
# ─────────────────────────────────────────────────────────────────────
#
# SCOPE: Production repositories only (complytime/ org).
#
# complytime/ (Production)
#   complyctl                       – CLI tool
#   complyscribe                    – C2P engine
#   complytime-collector-components – Observability toolkit
#   compliance-to-policy-go         – C2P Go library (fork)
#   org-infra                       – Shared CI/CD (infra, not synced)
#   .github                         – Org config  (infra, not synced)
#
# ─────────────────────────────────────────────────────────────────────

defaults:
  branch: main

sources:
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # complyctl — CLI tool for end-to-end compliance workflows
  # https://github.com/complytime/complyctl
  #
  # skip_org_sync: true — the config-declared README replaces the
  # auto-generated project page so we control frontmatter and layout.
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  - repo: complytime/complyctl
    skip_org_sync: true
    files:
      # ── Project overview (README) ──
      - src: README.md
        dest: content/docs/projects/complyctl/_index.md
        transform:
          inject_frontmatter:
            title: "complyctl"
            description: "A command-line tool for streamlining end-to-end compliance workflows."
            weight: 10
          rewrite_links: true
          strip_badges: true

      # ── Quick Start ──
      - src: docs/QUICK_START.md
        dest: content/docs/projects/complyctl/quick-start.md
        transform:
          inject_frontmatter:
            title: "Quick Start"
            description: "Get up and running with complyctl in minutes."
            weight: 20
          rewrite_links: true

      # ── Installation ──
      - src: docs/INSTALLATION.md
        dest: content/docs/projects/complyctl/installation.md
        transform:
          inject_frontmatter:
            title: "Installation"
            description: "Install complyctl on your system."
            weight: 30
          rewrite_links: true

      # ── Plugin Guide ──
      - src: docs/PLUGIN_GUIDE.md
        dest: content/docs/projects/complyctl/plugin-guide.md
        transform:
          inject_frontmatter:
            title: "Plugin Guide"
            description: "Discover, install, and manage complyctl plugins."
            weight: 40
          rewrite_links: true

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # complyscribe — Compliance-to-Policy engine
  # https://github.com/complytime/complyscribe
  #
  # skip_org_sync: true — we control the project page via config.
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  - repo: complytime/complyscribe
    skip_org_sync: true
    files:
      # ── Project overview (README) ──
      - src: README.md
        dest: content/docs/projects/complyscribe/_index.md
        transform:
          inject_frontmatter:
            title: "complyscribe"
            description: "Compliance-to-Policy engine for automating compliance documentation."
            weight: 10
          rewrite_links: true
          strip_badges: true

      # ── Docs index (detailed overview) ──
      - src: docs/index.md
        dest: content/docs/projects/complyscribe/overview.md
        transform:
          inject_frontmatter:
            title: "Overview"
            description: "Detailed overview of complyscribe features and concepts."
            weight: 20
          rewrite_links: true

      # ── Troubleshooting ──
      - src: docs/troubleshooting.md
        dest: content/docs/projects/complyscribe/troubleshooting.md
        transform:
          inject_frontmatter:
            title: "Troubleshooting"
            description: "Common issues and solutions for complyscribe."
            weight: 30
          rewrite_links: true

      # ── Tutorials ──
      - src: docs/tutorials/authoring.md
        dest: content/docs/projects/complyscribe/tutorials/authoring.md
        transform:
          inject_frontmatter:
            title: "Authoring Content"
            description: "Tutorial on authoring compliance content with complyscribe."
            weight: 41
          rewrite_links: true

      - src: docs/tutorials/github.md
        dest: content/docs/projects/complyscribe/tutorials/github.md
        transform:
          inject_frontmatter:
            title: "GitHub Integration"
            description: "Using complyscribe with GitHub Actions."
            weight: 42
          rewrite_links: true

      - src: docs/tutorials/sync-cac-content.md
        dest: content/docs/projects/complyscribe/tutorials/sync-cac-content.md
        transform:
          inject_frontmatter:
            title: "Sync CaC Content"
            description: "Synchronize Compliance-as-Code content with complyscribe."
            weight: 43
          rewrite_links: true

      - src: docs/tutorials/sync-oscal-content.md
        dest: content/docs/projects/complyscribe/tutorials/sync-oscal-content.md
        transform:
          inject_frontmatter:
            title: "Sync OSCAL Content"
            description: "Synchronize OSCAL content with complyscribe."
            weight: 44
          rewrite_links: true

      # ── Workflows ──
      - src: docs/workflows/assemble_diagrams.md
        dest: content/docs/projects/complyscribe/workflows/assemble-diagrams.md
        transform:
          inject_frontmatter:
            title: "Assemble Diagrams"
            description: "Workflow for assembling compliance diagrams."
            weight: 51
          rewrite_links: true

      - src: docs/workflows/create_diagrams.md
        dest: content/docs/projects/complyscribe/workflows/create-diagrams.md
        transform:
          inject_frontmatter:
            title: "Create Diagrams"
            description: "Workflow for creating compliance diagrams."
            weight: 52
          rewrite_links: true

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # compliance-to-policy-go — C2P Go library (fork)
  # https://github.com/complytime/compliance-to-policy-go
  #
  # skip_org_sync: true — we control the project page via config.
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
